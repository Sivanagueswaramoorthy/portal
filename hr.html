<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal | Applicant Tracking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 🛑 CHROME MOBILE REFRESH FIX: Enables native "Pull-to-refresh" */
        body, html, .main-content, .scrollable-area {
            overscroll-behavior-y: auto !important; 
        }
        
        /* Forces the table to perfectly fit within the mobile screen */
        .table-wrapper {
            overflow-x: auto;
            max-width: 100vw;
            -webkit-overflow-scrolling: touch;
        }

        /* Mobile specific header adjustments */
        @media (max-width: 768px) {
            .hr-header-left { gap: 10px !important; }
            .hr-header-left h2 { font-size: 0.95rem !important; }
        }
    </style>
</head>
<body>
    
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="brand flex-between">
            <div class="flex-center"><i class="fa-solid fa-briefcase"></i> HR Portal</div>
            <i class="fa-solid fa-xmark mobile-menu-btn" style="padding:0;" onclick="toggleSidebar()"></i>
        </div>
        <div class="nav-menu">
            <a class="nav-item active"><i class="fa-solid fa-users"></i> Applicant Tracking</a>
        </div>
        <div class="nav-bottom">
            <a class="nav-item" style="color: var(--danger);" onclick="signOut()"><i class="fa-solid fa-power-off"></i> Secure Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header flex-between">
            <div class="flex-center hr-header-left" style="gap: 15px;">
                <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                <h2 style="margin: 0; font-size: 1.1rem; color: var(--text-main);">Welcome, <span id="hr-company" style="color: var(--primary);">Loading...</span></h2>
            </div>
            
            <div class="user-profile">
                <div class="user-info">
                    <div class="user-name" id="headerName">Loading...</div>
                    <div class="user-email" id="headerEmail">...</div>
                </div>
                <img id="headerImage" src="" class="profile-img" referrerpolicy="no-referrer">
            </div>
        </header>

        <div class="scrollable-area">
            <div class="view-section active">
                <div style="margin-bottom: 24px;">
                    <h1 class="page-title">Candidate Pipeline</h1>
                    <p style="color: var(--text-muted); margin-top: 6px; font-size: 0.85rem;">Students from BIT Sathy who have applied to your company.</p>
                </div>

                <div class="table-wrapper">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Candidate Name</th>
                                <th>Department</th>
                                <th>Role Applied</th>
                                <th>DSA / OOP / Core</th>
                                <th>Application Status</th>
                                <th>Resume / Action</th>
                            </tr>
                        </thead>
                        <tbody id="hr-applicants-tbody">
                            <tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);"><i class="fa-solid fa-spinner fa-spin"></i> Loading pipeline...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="hr.js?v=mobile_fix_1"></script>
</body>
</html>
