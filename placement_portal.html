<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Hub Login | BIT Sathy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #f8fafc; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; border: 1px solid var(--border); }
        .brand-logo { font-size: 2.5rem; color: var(--primary); margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="fa-solid fa-building-columns brand-logo"></i>
        <h2 style="margin: 0 0 8px 0; font-weight: 800; color: var(--text-main);">Placement Hub</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px;">Sign in to access the coordinator dashboard.</p>
        
        <div style="text-align: left;">
            <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; display: block;">Email Address</label>
            <input type="email" id="email" class="control-input" style="width: 100%; margin-bottom: 16px;" placeholder="e.g., admin@gmail.com">
            
            <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; display: block;">Password</label>
            <input type="password" id="password" class="control-input" style="width: 100%; margin-bottom: 24px;" placeholder="Enter password">
        </div>
        
        <button class="action-btn btn-primary" style="width: 100%; height: 44px; font-size: 1rem; justify-content: center;" onclick="handleLogin()" id="loginBtn">Secure Login</button>
        
        <div id="error-msg" style="color: var(--danger); font-size: 0.85rem; margin-top: 16px; display: none; font-weight: 600;">Invalid credentials!</div>
    </div>

    <script>
        const BASE_URL = 'https://portal-6crm.onrender.com';

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('error-msg');
            
            err.style.display = 'none';
            
            if(!email || !password) {
                err.innerText = "Please enter both email and password.";
                err.style.display = 'block';
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';

            try {
                const req = await fetch(`${BASE_URL}/api/pc/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await req.json();

                if (data.success) {
                    // Set the token that the placement hub JS expects
                    localStorage.setItem('bit_session_token', data.token);
                    window.location.href = 'placement_hub.html';
                } else {
                    err.innerText = data.message;
                    err.style.display = 'block';
                    btn.innerHTML = 'Secure Login';
                }
            } catch (e) {
                err.innerText = "Server Error. Please ensure backend is running.";
                err.style.display = 'block';
                btn.innerHTML = 'Secure Login';
            }
        }
    </script>
</body>
</html>
